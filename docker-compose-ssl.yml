version: '3'
services:
  geoserver-ssl:
    build:
      context: .
      args:
        - GEOSERVER_VERSION=2.27.0
        - CORS_ENABLED=true
        - CORS_ALLOWED_METHODS=GET,POST,PUT,HEAD,OPTIONS
    ports:
      - "80:8080"    # HTTP access (will redirect to HTTPS)
      - "443:8443"   # HTTPS access
    environment:
      - INSTALL_EXTENSIONS=true
      - STABLE_EXTENSIONS=wps,csw
      - EXTRA_JAVA_OPTS=-Xms1G -Xmx2G
      # SSL Configuration
      - HTTPS_ENABLED=true
      - HTTPS_KEYSTORE_FILE=/opt/ssl/keystore.jks
      - HTTPS_KEYSTORE_PASSWORD=geoserver
      - HTTPS_KEY_ALIAS=geoserver
      # PostgreSQL Configuration
      - POSTGRES_JNDI_ENABLED=true
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - POSTGRES_DB=geoserver
      - POSTGRES_USERNAME=geoserver
      - POSTGRES_PASSWORD=geoserver
      - POSTGRES_JNDI_RESOURCE_NAME=jdbc/postgres
    volumes:
      - ./geoserver_data:/opt/geoserver_data/:Z
      - ./additional_libs:/opt/additional_libs:Z
      - ./ssl:/opt/ssl:Z  # Mount SSL certificates directory
    healthcheck:
      test: curl --fail --insecure "https://localhost:8443/geoserver/web/wicket/resource/org.geoserver.web.GeoServerBasePage/img/logo.png" || exit 1
      interval: 1m
      retries: 3
      timeout: 20s
    depends_on:
      - postgis

  postgis:
    image: postgis/postgis:17-3.4-alpine@sha256:5a1dbedac34e0e6663f8b7190d393339571f1cb3ecb2ab2f724524b4f3c7956e
    ports:
      - "5555:5432"
    environment:
      POSTGRES_USER: geoserver
      POSTGRES_PASSWORD: geoserver
    volumes:
      - ./postgis/postgresql_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: pg_isready -U geoserver -h localhost -t 5 || exit 1
      interval: 10s
      retries: 5
      timeout: 10s